services:
  - type: web
    name: polydcopier
    runtime: node
    region: frankfurt
    plan: starter   # $7/mo always-on; Free idles after 15min and adds cold starts
    branch: main
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALCHEMY_WS_URL
        sync: false
      - key: WALLETCONNECT_PROJECT_ID
        sync: false
      - key: MASTER_KEY
        generateValue: true
      - key: PUBLIC_URL
        sync: false
      - key: DB_PATH
        value: /data/bot.db
      - key: PAPER_TRADE
        value: "0"
    disk:
      name: polydcopier-data
      mountPath: /data
      sizeGB: 1
